<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vorax-report</title>
  <style>
    body{font-family:system-ui;background:#0f172a;color:white;max-width:500px;margin:40px auto;padding:20px}
    input,textarea{width:100%;padding:12px;margin-bottom:10px;font-size:16px;border-radius:8px;border:none;background:#1e293b;color:white}
    button{flex:1;padding:15px;border:none;border-radius:8px;color:white;font-size:16px;cursor:pointer}
   .btns{display:flex;gap:10px}
  </style>
</head>
<body>
  <h1>🚨 vorax report</h1>
  <p>report  en 10s</p>

  <input id="numero" placeholder="+225 07 01 01 01">
  <textarea id="details" placeholder="Que s'est-il passé? Ex: Fausse vente iPhone" rows="3"></textarea>

  <div class="btns">
    <button onclick="report('spam')" style="background:#FFA500">🚨 Spam</button>
    <button onclick="report('scam')" style="background:#DC2626">💸 Arnaque</button>
    <button onclick="report('abuse')" style="background:#7C3AED">👮 Abus</button>
  </div>

  <div id="gmail" style="margin-top:30px"></div>

<script>
  const types = {
    spam: {label:'Spam'}, scam: {label:'Arnaque'}, abuse: {label:'Abus'}
  }

  function report(type){
    const numero = document.getElementById('numero').value
    const details = document.getElementById('details').value
    if(!numero) return alert('Entre un numéro!')

    // PAS DE SUPABASE ICI

    const subject = `[Signalement] WhatsApp +${numero} - ${types[type].label}`
    const body = `Bonjour équipe WhatsApp,\n\nJe signale le numéro: +${numero}\nType: ${types[type].label}\nDétails: ${details}\n\nMerci de traiter ce signalement.`
    const link = `https://mail.google.com/mail/?view=cm&fs=1&to=support@whatsapp.com&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`

    document.getElementById('gmail').innerHTML = `<a href="${link}" target="_blank" style="display:block;padding:15px;background:#4285F4;color:white;text-align:center;text-decoration:none;border-radius:8px">📧 Envoyer à WhatsApp Support</a>`
  }
</script>
</body>
</html>
